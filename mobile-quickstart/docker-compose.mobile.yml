
services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 10
    networks:
      - multi_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - multi_network

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    env_file: .env
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - multi_network
  
  nats:
    image: nats:2.10-alpine
    command: >
      -js
      -a 0.0.0.0
      -m 8222
      --user testuser
      --pass testpassword
    ports:
      - "4222:4222"
    networks:
      - multi_network

  migrate:
    image: ghcr.io/microclub-usthb/multai-back:latest
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["uv", "run", "alembic", "upgrade", "head"]
    networks:
      - multi_network

  fastapi:
    image: ghcr.io/microclub-usthb/multai-back:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      minio:
        condition: service_started
      nats:
        condition: service_started
    ports:
      - "8000:8000"
    networks:
      - multi_network

volumes:
  postgres_data:
  minio_data:

networks:
  multi_network:
    driver: bridge
