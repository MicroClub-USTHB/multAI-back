name: multai-staging
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: multi_postgres
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - multi_network

  nats:
    image: nats:2.10-alpine
    container_name: multi_nats
    restart: unless-stopped
    command: >
      -js
      -sd /data
      -a 0.0.0.0
      -m ${NATS_MONITOR_PORT}
      --user ${NATS_USER}
      --pass ${NATS_PASSWORD}
    ports:
      - "${NATS_PORT}:4222"
      - "${NATS_MONITOR_PORT}:8222"
    volumes:
      - nats_data:/data
    networks:
      - multi_network

  minio:
    image: minio/minio:latest
    container_name: multi_minio
    restart: unless-stopped
    env_file:
      - .env.staging
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    networks:
      - multi_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: multi_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "${PGADMIN_PORT}:80"
    networks:
      - multi_network

  redis:
    image: redis:7-alpine
    container_name: multi_redis
    restart: unless-stopped
    env_file:
      - .env.staging
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - multi_network
    volumes:
      - redis_data:/data

  fastapi:
    image: ghcr.io/microclub-usthb/multai-back:latest
    container_name: multi_fastapi
    restart: unless-stopped
    env_file:
      - .env.staging
    depends_on:
      - postgres
      - redis
      - nats
      - minio
    ports:
      - "8000:8000"
    networks:
      - multi_network

  migrate:
    image: ghcr.io/microclub-usthb/multai-back:latest
    container_name: multi_migrate
    env_file:
      - .env.staging
    depends_on:
      - postgres
    command: ["uv", "run", "alembic", "upgrade", "head"]
    networks:
      - multi_network

  email-worker:
    image: ghcr.io/microclub-usthb/multai-back:latest
    container_name: multi_email_worker
    restart: unless-stopped
    env_file:
      - .env.staging
    depends_on:
      - nats
      - redis
    command: ["uv", "run", "python", "-m", "app.worker.email_worker.main"]
    networks:
      - multi_network

  photo-worker:
    image: ghcr.io/microclub-usthb/multai-back:latest
    container_name: multi_photo_worker
    restart: unless-stopped
    env_file:
      - .env.staging
    depends_on:
      - postgres
      - redis
      - nats
      - minio
    command: ["uv", "run", "python", "-m", "app.worker.photo_worker.main"]
    networks:
      - multi_network

  notification-worker:
    profiles: ["firebase"]
    image: ghcr.io/microclub-usthb/multai-back:latest
    container_name: multi_notification_worker
    restart: unless-stopped
    env_file:
      - .env.staging
    depends_on:
      - nats
      - redis
    command: ["uv", "run", "python", "-m", "app.worker.notification.main"]
    networks:
      - multi_network

  upload-group-worker:
    image: ghcr.io/microclub-usthb/multai-back:latest
    container_name: multi_upload_group_worker
    restart: unless-stopped
    env_file:
      - .env.staging
    depends_on:
      - postgres
      - redis
      - nats
      - minio
    command: ["uv", "run", "python", "-m", "app.worker.upload_group_worker.main"]
    networks:
      - multi_network

  audit-worker:
    image: ghcr.io/microclub-usthb/multai-back:latest
    container_name: multi_audit_worker
    restart: unless-stopped
    env_file:
      - .env.staging
    depends_on:
      - postgres
      - nats
    command: ["uv", "run", "python", "-m", "app.worker.audit.main"]
    networks:
      - multi_network

  storage-cleaner:
    image: ghcr.io/microclub-usthb/multai-back:latest
    container_name: multi_storage_cleaner
    restart: unless-stopped
    env_file:
      - .env.staging
    depends_on:
      - postgres
      - nats
    command: ["uv", "run", "python", "-m", "app.worker.storage_cleaner.main"]
    networks:
      - multi_network

volumes:
  postgres_data:
  minio_data:
  redis_data:
  nats_data:

networks:
  multi_network:
    driver: bridge